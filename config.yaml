app:
  name: DocuFlow
  version: "0.1"
  host: "127.0.0.1"
  port: 8080

# Eingabe-Ordner (beliebig viele)
input_folders:
- path: "D:/Dokumente/Teller/Test/DocuFlow/input"
  enabled: true
  watch: true

# Ausgabe-Basis
output:
  base_path: "D:/Dokumente/Teller/Test/DocuFlow/export"

# Auto-Sortierung (Default: AUS fuer Testphase)
auto_mode: false
# Konfidenz-Schwellwert für Auto-Sortierung (0.0–1.0)
auto_confidence_threshold: 0.9
# OCR primär: german-ocr (lokal, auf deutschen Rechnungen trainiert)
german_ocr:
  enabled: true
  backend: "ollama"     # "ollama" (Keyvan/german-ocr-turbo via Ollama, GPU) oder "llamacpp" (lokal, GGUF) oder "huggingface" (CPU)
  n_gpu_layers: -1      # -1 = volle GPU, 0 = CPU only (nur für llamacpp relevant)

# OCR Fallback: Ollama (falls german-ocr nicht verfügbar oder fehlschlägt)
ollama:
  url: "http://localhost:11434"
  model: "minicpm-v"
  timeout: 120

# Datenbank
database:
  path: "./data/docuflow.db"

# Templates
templates:
  path: "./templates"
